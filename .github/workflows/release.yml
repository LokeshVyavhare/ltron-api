name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — .deb + .AppImage
          - os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_target: x86_64-unknown-linux-gnu
            bundles: deb,appimage

          # macOS — universal .dmg (Intel + Apple Silicon)
          - os: macos-latest
            rust_target: x86_64-apple-darwin
            tauri_target: universal-apple-darwin
            bundles: dmg

          # Windows — .msi installer
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_target: x86_64-pc-windows-msvc
            bundles: msi

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      # macOS universal binary needs both arch targets
      - name: Add macOS arm64 target
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin

      # Linux system dependencies for WebKitGTK
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend deps
        run: npm ci
        working-directory: ui

      - name: Build frontend
        run: npm run build
        working-directory: ui

      # Run tauri CLI directly via npx — no tauri-action version confusion
      - name: Build Tauri app
        run: npx --yes @tauri-apps/cli@^2 build --target ${{ matrix.tauri_target }} --bundles ${{ matrix.bundles }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: true
          name: Ltron-api ${{ github.ref_name }}
          body: |
            ### Install
            - **Linux**: Download `.deb` (Ubuntu/Debian) or `.AppImage` (any distro)
            - **macOS**: Download `.dmg`, open it, drag Ltron-api to Applications
            - **Windows**: Download `.msi`, run it

            > First-time macOS users: if Gatekeeper blocks the app, right-click → Open → Open.
          files: |
            src-tauri/target/${{ matrix.tauri_target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.tauri_target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.tauri_target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.tauri_target }}/release/bundle/msi/*.msi
          fail_on_unmatched_files: false
