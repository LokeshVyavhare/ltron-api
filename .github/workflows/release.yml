name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — .deb + .AppImage
          - os: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
            tauri_target: x86_64-unknown-linux-gnu
            bundles: deb,appimage

          # macOS — universal .dmg (Intel + Apple Silicon)
          # rust_target must be a real Rust target; universal-apple-darwin is Tauri-only
          - os: macos-latest
            rust_target: x86_64-apple-darwin
            tauri_target: universal-apple-darwin
            bundles: dmg

          # Windows — .msi installer
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            tauri_target: x86_64-pc-windows-msvc
            bundles: msi

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      # macOS universal binary needs both arch targets added after toolchain install
      - name: Add macOS arm64 target
        if: matrix.os == 'macos-latest'
        run: rustup target add aarch64-apple-darwin

      # Linux system dependencies for WebKitGTK
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      - name: Install frontend deps
        run: npm ci
        working-directory: ui

      - name: Build frontend
        run: npm run build
        working-directory: ui

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS signing (optional — leave empty to skip)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows signing (optional)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # projectPath tells the action where package.json (and the tauri CLI) live
          projectPath: ui
          tagName: ${{ github.ref_name }}
          releaseName: 'Ltron-api ${{ github.ref_name }}'
          releaseBody: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ### Install
            - **Linux**: Download `.deb` (Ubuntu/Debian) or `.AppImage` (any distro)
            - **macOS**: Download `.dmg`, open it, drag Ltron-api to Applications
            - **Windows**: Download `.msi`, run it

            > First-time macOS users: if Gatekeeper blocks the app, right-click → Open → Open.
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.tauri_target }} --bundles ${{ matrix.bundles }}
